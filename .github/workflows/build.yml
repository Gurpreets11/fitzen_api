name: Java WAR Build

on:
  push:
    branches:
      - master
      - release

jobs:

  build:

    runs-on: self-hosted

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify Java
        run: java -version

      - name: Verify Maven
        run: mvn -version

      - name: Build WAR
        run: mvn clean package

      - name: Show Target Folder
        run: dir target